<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudyVerse – My Books</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="mylibrary.css" />
<link rel="stylesheet" href="mybooks.css" />
</head>
<body>

<nav id="side-menu" class="collapsed">
<button id="toggle-menu" aria-label="Toggle Side Menu">&#9776;</button>
<ul>
<li>
<a href="index.html">
<span class="icon">&#127968;</span>
<span class="text">Home</span>
</a>
</li>
<li>
<a href="mylibrary.html">
<span class="icon">&#128218;</span>
<span class="text">Library</span>
</a>
</li>
<li>
<a href="#" id="menu">
<span class="icon">&#10084;</span>
<span class="text">Favorites</span>
</a>
</li>
<li>
<a href="mybooks.html">
<span class="icon">&#128214;</span>
<span class="text">Your Books</span>
</a>
</li>
<li>
<a href="assignment.html">
<span class="icon">&#128221;</span>
<span class="text">Assignments</span>
</a>
</li>
<li id="authButton"></li>
</ul>
</nav>

<div id="sidebar">
<button id="closeSidebar">&times;</button>
<h3>Favorites List</h3>
<div id="favoritesList"></div>
</div>

<header id="main-head"> 
<div id="icon">
<svg width="34" height="34" viewBox="0 0 44 44" fill="none">
<rect width="44" height="44" rx="10" fill="#ffffff"/>
<rect x="10" y="28" width="24" height="5" rx="2" fill="#e84545"/>
<rect x="11" y="22" width="22" height="5" rx="2" fill="#4a90d9"/>
<rect x="12" y="16" width="20" height="5" rx="2" fill="#e8c97e"/>
<rect x="13" y="10" width="18" height="5" rx="2" fill="#50c878"/>
</svg>
<span class="nav-brand" style="color: white; margin-left: 10px;">StudyVerse</span>
</div>

<div class="search-container">
<input type="text" id="searchInput" placeholder="Search your collection..." />
<button id="searchBtn">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
</button>
</div>
</header>

<main class="main-content">
<div class="page-heading">
<h1>My Collection</h1>
</div>

<section class="section">
<div class="section-header">
<h2 class="section-title">Recently Added</h2>
<span class="section-count" id="recentCount">0 books</span>
</div>
<div class="books-grid" id="recentBooksGrid">
</div>
</section>

<section class="section">
<div class="section-header">
<h2 class="section-title">Reading Leaderboard</h2>
<span class="section-subtitle">Based on your timer</span>
</div>
<div class="top5-list" id="top5List">
</div>
</section>

<section class="section">
<div class="section-header">
<h2 class="section-title">All Favorites</h2>
<span class="section-count" id="favCount">0 books</span>
</div>
<div class="books-grid" id="favBooksGrid">
</div>
</section>
</main>

<div class="modal-overlay" id="modalOverlay">
<div class="modal">
<button class="modal-close" id="modalClose">✕</button>
<div class="modal-body">
<div class="modal-left">
    <img id="modalCover" src="" alt="Book Cover" />
    <div class="modal-info">
        <h2 id="modalTitle">Book Title</h2>
        <p class="modal-author" id="modalAuthor" style="color: #4a90d9; font-weight: 500;"></p>
        <hr style="opacity: 0.1; margin: 15px 0;">
        <div id="modalDescription"></div>
    </div>
</div>

<div class="modal-right">
    <h3 class="timer-title">Reading Session</h3>
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-btns">
<button class="btn-start" id="timerStart">Start</button>
<button class="btn-stop" id="timerStop" disabled>Stop</button>
    </div>
    <div class="timer-totals">
        <div class="total-row">
            <span>Session:</span>
<span id="sessionTime">0s</span>
        </div>
        <div class="total-row">
<span>Lifetime:</span>
            <span id="totalTimeDisplay">0s</span>
</div>
    </div>
    <button class="btn-clear" id="timerClear">Reset Book Progress</button>
</div>
</div>
</div>
</div>

<script src="mybooks.js"></script>
</body>
</html>
