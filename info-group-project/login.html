<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>

<body>

<h2>Login</h2>

<input id="username" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="msg"></p>



<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAT74JRqSabG-CyfQSYLGM6I_TIFuudAkk",
  authDomain: "info-group-project-5db1f.firebaseapp.com",
  projectId: "info-group-project-5db1f",
  storageBucket: "info-group-project-5db1f.firebasestorage.app",
  messagingSenderId: "654146332109",
  appId: "1:654146332109:web:e4f3001036c040a2885084"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

async function login() {
  const email = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try {
 await auth.signInWithEmailAndPassword(email, password);
    
window.location.href = "home/index.html";
} catch (error) {
document.getElementById("msg").innerText = "Invalid login";
}
}
</script>

</body>
</html>
